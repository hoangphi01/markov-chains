title: "Chuỗi Markov - Tài liệu Song ngữ"
description: "Bilingual Vietnamese-English Markov Chains notes for PhD study"
baseurl: ""
url: ""

# Collections for chapters (future scaling)
collections:
  chapters:
    output: true
    permalink: /:path/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "chapters"
    values:
      layout: "chapter"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
