<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}Chuỗi Markov</title>
  <!-- Prevent flash: apply saved theme/font before render -->
  <script>
    (function(){
      var t=localStorage.getItem('theme')||'original';
      var f=localStorage.getItem('fontSize')||'3';
      document.documentElement.setAttribute('data-theme',t);
      document.documentElement.setAttribute('data-fontsize',f);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/css/framework.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/book.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/themes.css' | relative_url }}">
  {% include mathjax.html %}
</head>
<body>
  {{ content }}

  <!-- Settings floating button -->
  <button id="settings-btn" class="settings-btn" aria-label="Cài đặt giao diện" aria-expanded="false" aria-controls="settings-panel">
    <span class="material-icons-outlined" style="font-size:22px">text_fields</span>
  </button>

  <!-- Settings panel -->
  <div id="settings-panel" class="settings-panel" role="dialog" aria-label="Giao diện đọc">
    <h3>Giao diện đọc</h3>

    <!-- Font size -->
    <div class="font-size-controls">
      <button id="font-decrease" aria-label="Giảm cỡ chữ" style="font-size:14px">A</button>
      <div class="font-size-bar">
        <div class="font-size-bar-fill" id="font-bar-fill"></div>
      </div>
      <span class="font-size-label" id="font-size-label">18px</span>
      <button id="font-increase" aria-label="Tăng cỡ chữ" style="font-size:20px">A</button>
    </div>

    <div class="settings-divider"></div>

    <!-- Theme grid -->
    <div class="theme-grid">
      <button class="theme-card" data-theme="original">
        <div class="theme-card-swatch"></div>
        Original
      </button>
      <button class="theme-card" data-theme="quiet">
        <div class="theme-card-swatch"></div>
        Quiet
      </button>
      <button class="theme-card" data-theme="paper">
        <div class="theme-card-swatch"></div>
        Paper
      </button>
      <button class="theme-card" data-theme="bold">
        <div class="theme-card-swatch"></div>
        Bold
      </button>
      <button class="theme-card" data-theme="calm">
        <div class="theme-card-swatch"></div>
        Calm
      </button>
      <button class="theme-card" data-theme="focus">
        <div class="theme-card-swatch"></div>
        Focus
      </button>
      <button class="theme-card" data-theme="dark">
        <div class="theme-card-swatch"></div>
        Dark
      </button>
    </div>
  </div>

  <!-- Mobile overlay -->
  <div id="settings-overlay" class="settings-overlay"></div>

  <script src="{{ '/js/nav.js' | relative_url }}"></script>
  <script src="{{ '/js/settings.js' | relative_url }}"></script>
</body>
</html>
